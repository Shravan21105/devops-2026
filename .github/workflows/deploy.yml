name: Java CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

    # Step 1: Checkout source code from GitHub repository
    - name: Checkout Repository
      uses: actions/checkout@v3

    # Step 2: Setup Java environment (JDK 21)
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'

    # Step 3: Build the application using Maven Wrapper
    - name: Build Application (Generate JAR)
      run: ./mvnw clean package

    # Step 4: Archive the generated artifact (JAR file)
    - name: Archive Artifact
      uses: actions/upload-artifact@v4
      with:
        name: devops-jar
        path: target/devops-0.0.1-SNAPSHOT.jar

    # Step 5: Transfer the JAR file to EC2 instance via SCP (SSH)
    - name: Upload JAR to EC2
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        source: "target/devops-0.0.1-SNAPSHOT.jar"
        target: "/home/ec2-user/target/"

    # Step 6: Connect to EC2 via SSH and start the application
    - name: Deploy and Run Application on EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          set -e
        
          cd /home/ec2-user/target
        
          # Stop old app
          pkill -f devops-0.0.1-SNAPSHOT.jar || true
          sleep 2
        
          # Check files
          echo "Files:"
          ls -lt
        
          # Start app
          echo "Starting app..."
          nohup java -jar devops-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
        
          # Wait + retry health check
          echo "Waiting for app to be ready..."
        
          for i in {1..30}
          do
            if curl -sf http://localhost:8080 > /dev/null; then
              echo "✅ App is UP"
              break
            fi
            echo "Retry $i..."
            sleep 1
          done
        
          # Final check
          if ! curl -sf http://localhost:8080 > /dev/null; then
            echo "❌ App failed to start"
            echo "Logs:"
            cat app.log
            exit 1
          fi
        
          # Verify process
          ps -ef | grep java | grep -v grep
        
          echo "🚀 Deployment Success"