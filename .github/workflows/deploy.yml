name: Java CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build JAR
      run: ./mvnw clean package

    # Copy JAR
    - name: Copy JAR to EC2
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        source: "target/devops-0.0.1-SNAPSHOT.jar"
        target: "/home/ec2-user/"

    # Run JAR (FIXED)
    - name: Run JAR on EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          set -e
          cd /home/ec2-user/target

          # kill old
          pkill -f devops-0.0.1-SNAPSHOT.jar || true

          # ensure jar exists
          ls -lt

          # run new
          nohup java -jar devops-0.0.1-SNAPSHOT.jar > app.log 2>&1 &

          # wait so process doesn't die with SSH session
          sleep 5

          # verify
          ps -ef | grep java | grep -v grep

          # check if app is running
          curl -f http://localhost:8080 || exit 1
          
